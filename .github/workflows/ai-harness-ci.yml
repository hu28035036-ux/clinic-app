name: AI Harness CI

# Phase 6 — AI 명령 하네스 (parser / resolver / validator / preview / executor / harness)
# 풀세트 자동 실행. AI_HARNESS_PLAN.md § 6 정합:
#   "운영 환경에서는 하네스 실행 권한 제한 (관리자만), 운영 DB 절대 사용 금지,
#    CI 환경에서는 자동 실행 (Phase 6부터)."
#
# 검증 항목:
#   - pytest 전체 회귀 (Phase 1~6 모듈 + 기존 모든 회귀)
#   - Ruff lint
#   - DB 경로 안전 검사 (운영 DB 사용 금지 가드)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch: {}

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20

    env:
      PYTHONIOENCODING: utf-8
      # 운영 DB 사용 차단 — conftest 가 격리하지만 이중 안전망
      DOSU_DB_PATH: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) { python -m pip install -r requirements.txt }
          if (Test-Path requirements-dev.txt) { python -m pip install -r requirements-dev.txt }

      - name: Ruff lint (app + tests)
        run: python -m ruff check app tests

      - name: DB path safety check (운영 DB 사용 금지 가드)
        run: python scripts/check_db_path.py
        # check_db_path 는 운영 환경에서 단독 실행되면 INFO 로 종료. CI 에서는 임시 경로 강제.

      - name: Pytest — Phase 1~6 AI 모듈 단독
        run: |
          python -m pytest `
            tests/test_phase01_ai_command.py `
            tests/test_phase02_ai_parser_resolver.py `
            tests/test_phase03_ai_validator_preview.py `
            tests/test_phase04_ai_new_patient_flow.py `
            tests/test_phase05_ai_executor.py `
            tests/test_phase06_ai_harness.py `
            tests/test_phase06_ai_harness_router.py `
            -v

      - name: Pytest — 전체 회귀
        run: python -m pytest tests -q
