{% extends "base.html" %}
{% block title %}서버 모드 - 접속 안내{% endblock %}
{% block content %}
<div class="setup-wrap">
  <h1>🖥️ 서버가 실행 중입니다</h1>
  <p>같은 네트워크의 다른 PC에서 아래 주소 중 하나로 접속하세요.</p>
  <div class="ip-list">
    {% for ip in local_ips %}
      <div class="ip-row">
        <code>http://{{ ip }}:{{ config.port }}</code>
      </div>
    {% endfor %}
  </div>
  <div class="actions">
    <a class="primary btn" href="/">이 PC에서 바로 사용하기 →</a>
  </div>
</div>
{% endblock %}
