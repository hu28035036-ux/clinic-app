<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ app_title() }}{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230EA5E9'/%3E%3Cpath d='M32 16v32M16 32h32' stroke='white' stroke-width='8' stroke-linecap='round'/%3E%3C/svg%3E" />
  <!-- v= 쿼리스트링에 APP_VERSION 사용 → 버전업 시 자동 캐시 무효화 (v1.2.8+) -->
  <link rel="stylesheet" href="/static/css/app.css?v={{ app_version|default('dev') }}" />
  <!-- 로컬 vendor — 오프라인·방화벽 환경에서도 동작 (v1.2.2 부터) -->
  <!-- FullCalendar v6 은 JS 안에 CSS 내장이라 별도 CSS 링크 불필요 -->
  <script src="/static/vendor/fullcalendar-6.1.15.min.js"></script>
  <script src="/static/vendor/sortable-1.15.2.min.js"></script>
  <script defer src="/static/vendor/alpinejs-3.14.1.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="topbar">
    <div class="brand">🏥 {{ app_title() }} <a href="/" class="home-btn">🏠</a></div>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
