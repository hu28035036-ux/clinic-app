{# AI 예약 도우미 카드 — 예약관리 화면 *내부* 컴포넌트 (전용 탭 ⊥, § 16.2).
   단위화 (§ 15.3) 정합 — 입력 / 결과 / 환자 후보 / 치료항목 / 신환 / 승인 / 메시지 모두 본 partial 안에서 컴포넌트 단위 클래스로 분리.
   동작은 inline `<script>` 로 self-contained — 외부 ai_helper.js 캐시 / 로드 실패 무관 보장.
#}
<script>
(function () {
  // self-contained Alpine 컴포넌트 정의 — partial 안에 직접 포함. 외부 JS 의존 ⊥.
  function aiHelperFactory() {
    return {
      open: true,
      busy: false,
      raw_text: "",
      error: "",
      command_id: null,
      result: null,
      diagnostics: null,
      approve_memo: "",
      approved_payload: null,

      init() {},

      _token() {
        return localStorage.getItem("dosu_admin_token") || window.adminToken || "";
      },
      _headers() {
        const t = this._token();
        const h = { "Content-Type": "application/json" };
        if (t) h["X-Admin-Token"] = t;
        return h;
      },

      statusBadgeClass() {
        if (!this.result) return "ai-helper-badge--info";
        const s = this.result.status;
        if (s === "executed" || s === "needs_approval") return "ai-helper-badge--success";
        if (s === "patient_selection_required" || s === "treatment_selection_required" ||
            s === "treatment_alias_conflict" || s === "patient_not_found")
          return "ai-helper-badge--warning";
        if (s === "validation_failed" || s === "patient_mismatch" || s === "rejected" || s === "failed")
          return "ai-helper-badge--danger";
        return "ai-helper-badge--info";
      },
      statusBadgeText() {
        const s = this.result ? this.result.status : "";
        const map = {
          needs_approval: "승인 대기",
          patient_selection_required: "환자 선택 필요",
          patient_mismatch: "환자 불일치",
          patient_not_found: "환자 없음 (신환)",
          treatment_selection_required: "치료항목 선택 필요",
          treatment_alias_conflict: "치료항목 충돌",
          treatment_not_found: "치료항목 없음",
          validation_failed: "검증 실패",
          executed: "등록됨",
          rejected: "거부됨",
          failed: "실패",
        };
        return map[s] || s || "대기";
      },

      async onParse() {
        this.error = "";
        this.approved_payload = null;
        const txt = (this.raw_text || "").trim();
        if (!txt) return;
        const today = new Date();
        this.busy = true;
        try {
          const r = await fetch("/api/ai/commands/parse", {
            method: "POST",
            headers: this._headers(),
            body: JSON.stringify({
              raw_text: txt,
              current_calendar_year: today.getFullYear(),
              current_calendar_month: today.getMonth() + 1,
              today_iso: today.toISOString().slice(0, 10),
            }),
          });
          if (r.status === 401) {
            this.error = "관리자 인증이 필요합니다. 우측 상단 🔒 버튼으로 로그인 후 다시 시도해주세요.";
            return;
          }
          const body = await r.json();
          if (!r.ok || !body.ok) { this.error = body.message || "분석 실패"; return; }
          this.command_id = body.command_id;
          this.result = body.result;
          this.diagnostics = body.diagnostics;
        } catch (e) {
          this.error = "네트워크 오류: " + e.message;
        } finally { this.busy = false; }
      },

      async onSelectPatient(patient_id) {
        if (!this.command_id || !patient_id) return;
        this.error = ""; this.busy = true;
        try {
          const r = await fetch(`/api/ai/commands/${this.command_id}/select-patient`, {
            method: "POST", headers: this._headers(),
            body: JSON.stringify({ patient_id: patient_id }),
          });
          const body = await r.json();
          if (!r.ok || !body.ok) { this.error = body.message || "환자 선택 실패"; return; }
          this.result = body.result;
          this.diagnostics = body.diagnostics;
        } catch (e) { this.error = "네트워크 오류: " + e.message; }
        finally { this.busy = false; }
      },

      async onApprove() {
        if (!this.command_id) return;
        this.error = ""; this.busy = true;
        try {
          const r = await fetch(`/api/ai/commands/${this.command_id}/approve`, {
            method: "POST", headers: this._headers(),
            body: JSON.stringify({ memo: this.approve_memo || null }),
          });
          const body = await r.json();
          if (!r.ok) { this.error = body.detail || body.message || "승인 실패"; return; }
          if (!body.ok) {
            this.error = body.error_message ||
              (body.error === "approval_blocked" ? "승인 불가 상태입니다." : "승인 실패");
            if (body.result) this.result = body.result;
            return;
          }
          this.approved_payload = body.result_payload || {};
          if (this.result) this.result.status = body.execution_status || "executed";
          if (typeof window.refreshDayBoard === "function") {
            try { window.refreshDayBoard(); } catch (e) {}
          }
        } catch (e) { this.error = "네트워크 오류: " + e.message; }
        finally { this.busy = false; }
      },

      async onReject() {
        if (!this.command_id) return;
        this.error = ""; this.busy = true;
        try {
          const r = await fetch(`/api/ai/commands/${this.command_id}/reject`, {
            method: "POST", headers: this._headers(),
            body: JSON.stringify({ reason: "사용자 취소" }),
          });
          const body = await r.json();
          if (!r.ok || !body.ok) { this.error = body.message || "거부 실패"; return; }
          if (this.result) this.result.status = "rejected";
        } catch (e) { this.error = "네트워크 오류: " + e.message; }
        finally { this.busy = false; }
      },

      onReset() {
        this.raw_text = ""; this.error = "";
        this.command_id = null; this.result = null; this.diagnostics = null;
        this.approve_memo = ""; this.approved_payload = null;
      },
    };
  }
  // 등록 — 즉시 + alpine:init 안전망 (어느 시점이든 동작)
  window.aiHelper = aiHelperFactory;
  function registerAi() {
    if (window.Alpine && typeof window.Alpine.data === "function") {
      window.Alpine.data("aiHelper", aiHelperFactory);
      return true;
    }
    return false;
  }
  if (!registerAi()) document.addEventListener("alpine:init", registerAi);
})();
</script>
<div class="ai-helper-card" id="ai-helper-card" x-data="aiHelper">

  <!-- 헤더 -->
  <div class="ai-helper-header">
    <div class="ai-helper-title">
      <span class="ai-helper-icon">⚡</span>
      <span>AI 예약 도우미</span>
      <span class="ai-helper-badge ai-helper-badge--info" x-show="!command_id">대기</span>
      <span class="ai-helper-badge"
            x-show="command_id"
            :class="statusBadgeClass()"
            x-text="statusBadgeText()"></span>
    </div>
    <button type="button" class="ai-helper-toggle"
            :aria-expanded="open ? 'true' : 'false'"
            @click="open = !open"
            :title="open ? '접기' : '펼치기'">
      <span x-text="open ? '⌃' : '⌄'"></span>
    </button>
  </div>

  <div class="ai-helper-body" x-show="open" x-cloak>

    <!-- 1. 자연어 입력 -->
    <div class="ai-helper-input-row">
      <input type="text"
             class="ai-helper-input"
             x-model="raw_text"
             placeholder='예: "박환자 5월30일 9시 박치료사 도수30 예약"'
             @keyup.enter="onParse()"
             :disabled="busy">
      <button type="button"
              class="ai-helper-btn ai-helper-btn--primary"
              @click="onParse()"
              :disabled="busy || !raw_text.trim()">
        <span x-show="!busy">분석</span>
        <span x-show="busy">처리 중…</span>
      </button>
      <button type="button"
              class="ai-helper-btn ai-helper-btn--ghost"
              @click="onReset()"
              :disabled="busy">
        초기화
      </button>
    </div>
    <div class="ai-helper-hint">
      자연어로 입력 → AI 가 분석 → 사용자 확인 후 등록. 승인 전에는 DB 변경 ⊥.
    </div>

    <!-- 2. 검증 메시지 / 에러 -->
    <template x-if="error">
      <div class="ai-helper-msg ai-helper-msg--danger" x-text="error"></div>
    </template>

    <!-- 3. 진단 (privacy / hallucination) — 위반 발생 시 강조 -->
    <template x-if="diagnostics && (!diagnostics.privacy.ok || !diagnostics.hallucination.ok)">
      <div class="ai-helper-msg ai-helper-msg--danger">
        <strong>⚠ 안전 정책 위반 감지</strong>
        <ul>
          <template x-if="!diagnostics.privacy.ok">
            <template x-for="v in diagnostics.privacy.violations" :key="'p:'+v">
              <li x-text="'PII: ' + v"></li>
            </template>
          </template>
          <template x-if="!diagnostics.hallucination.ok">
            <template x-for="v in diagnostics.hallucination.violations" :key="'h:'+v">
              <li x-text="'할루시네이션: ' + v"></li>
            </template>
          </template>
        </ul>
      </div>
    </template>

    <!-- 4. 분석 결과 — parse 단계 정보 카드 -->
    <template x-if="result">
      <div class="ai-helper-result">

        <!-- 환자 / 치료사 / 날짜 / 시간 / 치료항목 요약 -->
        <div class="ai-helper-summary">
          <div class="ai-helper-summary-item">
            <div class="ai-helper-summary-label">환자</div>
            <div class="ai-helper-summary-value"
                 x-text="result.selected_patient
                          ? (result.selected_patient.name + ' (' + (result.selected_patient.chart_no || '-') + ')')
                          : (result.parsed.patient_name || '-')"></div>
          </div>
          <div class="ai-helper-summary-item">
            <div class="ai-helper-summary-label">치료사</div>
            <div class="ai-helper-summary-value"
                 x-text="result.therapist_resolution.therapist_name || result.parsed.therapist_name || '-'"></div>
          </div>
          <div class="ai-helper-summary-item">
            <div class="ai-helper-summary-label">날짜</div>
            <div class="ai-helper-summary-value"
                 x-text="result.date_resolution.resolved_date || result.parsed.date_text || '-'"></div>
          </div>
          <div class="ai-helper-summary-item">
            <div class="ai-helper-summary-label">시간</div>
            <div class="ai-helper-summary-value"
                 x-text="result.time_resolution.hour !== null
                          ? String(result.time_resolution.hour).padStart(2,'0') + ':' + String(result.time_resolution.minute || 0).padStart(2,'0')
                          : (result.parsed.time_text || '-')"></div>
          </div>
          <div class="ai-helper-summary-item ai-helper-summary-item--wide">
            <div class="ai-helper-summary-label">치료항목</div>
            <div class="ai-helper-summary-value">
              <template x-for="ti in result.treatment_items" :key="ti.raw_text">
                <span class="ai-helper-tag"
                      :class="ti.status === 'db_verified' ? 'ai-helper-tag--ok' : 'ai-helper-tag--warn'"
                      :title="ti.status">
                  <span x-text="ti.raw_text"></span>
                  <template x-if="ti.matched_treatment_name">
                    <span> → <span x-text="ti.matched_treatment_name"></span></span>
                  </template>
                </span>
              </template>
              <template x-if="result.treatment_items.length === 0">
                <span class="ai-helper-muted">-</span>
              </template>
            </div>
          </div>
        </div>

        <!-- 환자 후보 다수 — 사용자 선택 -->
        <template x-if="result.status === 'patient_selection_required'
                       && result.patient_resolution.candidates.length > 1">
          <div class="ai-helper-candidate-block">
            <div class="ai-helper-candidate-title">
              동명이인 <span x-text="result.patient_resolution.candidates.length"></span>명 검색됨 — 선택해주세요
            </div>
            <div class="ai-helper-candidate-list">
              <template x-for="c in result.patient_resolution.candidates" :key="c.patient_id">
                <button type="button"
                        class="ai-helper-candidate"
                        :disabled="busy"
                        @click="onSelectPatient(c.patient_id)">
                  <div class="ai-helper-candidate-name"
                       x-text="c.name + ' · ' + (c.chart_no || '차트 -')"></div>
                  <div class="ai-helper-candidate-sub">
                    <span x-text="'생년월일 ' + (c.birth_date || '-')"></span>
                    <span x-text="' · 연락처 ' + (c.phone || '-')"></span>
                  </div>
                </button>
              </template>
            </div>
          </div>
        </template>

        <!-- 환자 미일치 (차트번호 + 이름 mismatch) -->
        <template x-if="result.status === 'patient_mismatch'">
          <div class="ai-helper-msg ai-helper-msg--danger">
            <strong>차트번호와 환자명이 서로 다른 환자를 가리킵니다.</strong>
            <div>승인 불가. 명령을 수정하거나 환자를 다시 확인해주세요.</div>
          </div>
        </template>

        <!-- 신환 등록 제안 -->
        <template x-if="result.status === 'patient_not_found' && result.new_patient_proposal">
          <div class="ai-helper-msg ai-helper-msg--warning">
            <strong>검색된 환자가 없습니다.</strong>
            <div>신환으로 등록한 뒤 예약을 계속 진행하려면 좌측 사이드바의 "＋ 신규 환자 등록" 버튼을 사용해주세요.</div>
          </div>
        </template>

        <!-- 치료항목 미확정 / alias 충돌 -->
        <template x-if="result.status === 'treatment_alias_conflict'
                      || result.status === 'treatment_selection_required'
                      || result.status === 'treatment_not_found'">
          <div class="ai-helper-msg ai-helper-msg--warning">
            <strong>치료항목 확정 필요</strong>
            <div>치료항목 후보가 모호하거나 매칭되지 않았습니다. 명령을 수정해주세요.</div>
          </div>
        </template>

        <!-- 검증 결과 (validation issues) -->
        <template x-if="result.validation && result.validation.issues.length > 0">
          <div class="ai-helper-msg"
               :class="result.validation.can_approve ? 'ai-helper-msg--info' : 'ai-helper-msg--danger'">
            <ul>
              <template x-for="i in result.validation.issues" :key="i.code">
                <li>
                  <span class="ai-helper-issue-code" x-text="i.code"></span>
                  <span x-text="i.message"></span>
                </li>
              </template>
            </ul>
          </div>
        </template>

        <!-- 승인 카드 -->
        <template x-if="result.status === 'needs_approval' && result.preview">
          <div class="ai-helper-approval">
            <div class="ai-helper-approval-title" x-text="result.preview.title || '예약 후보'"></div>
            <div class="ai-helper-approval-prompt" x-text="result.preview.prompt || '해당 날짜에 예약 등록할까요?'"></div>
            <div class="ai-helper-approval-memo">
              <label>
                <span>메모 (선택)</span>
                <input type="text" class="ai-helper-input ai-helper-input--sm"
                       x-model="approve_memo" placeholder="메모">
              </label>
            </div>
            <div class="ai-helper-approval-actions">
              <button type="button"
                      class="ai-helper-btn ai-helper-btn--primary"
                      @click="onApprove()" :disabled="busy">
                예약 등록 (승인)
              </button>
              <button type="button"
                      class="ai-helper-btn ai-helper-btn--ghost"
                      @click="onReject()" :disabled="busy">
                취소
              </button>
            </div>
          </div>
        </template>

        <!-- 등록 완료 결과 -->
        <template x-if="approved_payload">
          <div class="ai-helper-msg ai-helper-msg--success">
            <strong>예약 후보가 등록되었습니다.</strong>
            <div>
              예약 ID:
              <code x-text="approved_payload.appointment_id || '-'"></code>
            </div>
            <div>
              <button type="button" class="ai-helper-btn ai-helper-btn--ghost ai-helper-btn--sm"
                      @click="onReset()">새 명령</button>
            </div>
          </div>
        </template>

      </div>
    </template>

  </div>
</div>
