[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --strict-markers
# tests/temp 은 conftest.py 가 세션별 격리 DB/APPDATA 를 만드는 임시 영역.
# 테스트 파일이 들어갈 일 없고, 누적된 디렉터리에 Windows 파일 핸들 락이
# 잡히면 collection 단계에서 PermissionError 가 발생하므로 재귀 제외.
norecursedirs = tests/temp
filterwarnings =
    ignore::DeprecationWarning
markers =
    smoke: 하네스 자체 동작 확인 테스트
